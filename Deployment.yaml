apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-deployment
  labels:
    app: my-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-frontend

  template:
    metadata:
      labels:
        app: my-frontend

    spec:
      containers:
        - name: my-frontend
          image: sanju2024/cicd_3:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80